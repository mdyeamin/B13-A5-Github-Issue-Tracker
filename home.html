<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyui CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontAwesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font geist-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- link with css  -->
    <link rel="stylesheet" href="style.css">
    <!-- fabicon  -->
    <link rel="icon" href="assets/Aperture.png" type="image/x-icon">
    <title>GitHub Issue Tracker</title>
</head>

<body class="min-h-screen">
    <header class="shadow-sm">
        <div class="navbar bg-base-100 max-w-[1200px] mx-auto">
            <div class="flex-1 flex items-center gap-2">

                <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
                <h4 class="text-2xl hidden md:block font-semibold text-[#24292e]">GitHub Issues Tracker</h4>

            </div>
            <div class="flex items-center gap-2">


                <a href="./index.html">
                    <button class="btn btn-xs btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i>
                        LogOut</button>
                </a>
            </div>
        </div>
    </header>
    <!--  -->
    <!-- modal container  -->
    <div>
        <dialog id="card_modal" class="modal backdrop-blur-sm">
            <div id="modal-container" class="modal-box max-w-xl p-6 bg-white rounded-2xl shadow-xl">


            </div>

            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>
    </div>



    <section class="issues max-w-[1200px] mx-auto">
        <!-- tag and search  -->
        <div class="flex items-center justify-between mx-2 my-5">
            <h4 class="text-xl font-semibold text-[#24292e]">All Issues</h4>
            <div class="flex items-center gap-2">
                <input id="searchInput" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />

                <button id="searchBtn" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            </div>
        </div>
        <!-- issue buttons -->
        <div class=" shadow-sm p-5 ">
            <button id="allBtn" class="btn btn-soft">All</button>
            <button id="openBtn" class="btn btn-soft">Open</button>
            <button id="closedBtn" class="btn btn-soft">Closed</button>
        </div>
        <!-- issue count and status -->
        <div class=" shadow-sm p-5 bg-white">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="bg-[#ECE4FF] w-14 h-14 rounded-full flex items-center justify-center">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div class="">
                        <h4 class="text-lg font-bold"><span id="issueLength">0</span> Issues</h4>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <span class="inline-block w-3 h-3 bg-[#00A96E] rounded-full"></span>
                        <span>Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="inline-block w-3 h-3 bg-[#A855F7] rounded-full"></span>
                        <span>Closed</span>
                    </div>

                </div>
            </div>

        </div>
        <!-- spinner -->
        <div id="spinner" class="hidden flex justify-center items-center my-10">
            <span class="loading loading-dots loading-xl"></span>
        </div>
        <div id="issue-container" class="grid grid-cols-1 md:grid-cols-3  gap-6 my-5">

        </div>

    </section>


    <script src="func/home.js"></script>
</body>

</html>
