<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyui CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontAwesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font geist-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- link with css  -->
    <link rel="stylesheet" href="style.css">
    <!-- fabicon  -->
    <link rel="icon" href="assets/Aperture.png" type="image/x-icon">
    <title>GitHub Issue Tracker</title>
</head>

<body>
    <header class="shadow-sm">
        <div class="navbar bg-base-100 max-w-[1200px] mx-auto">
            <div class="flex-1 flex items-center gap-2">

                <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
                <h4 class="text-2xl hidden md:block font-semibold text-[#24292e]">GitHub Issues Tracker</h4>

            </div>
            <div class="flex items-center gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />

                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>

    <section class="issues max-w-[1200px] mx-auto">
        <!-- tag and search  -->
        <div class="flex items-center justify-between mx-2 my-5">
            <h4 class="text-xl font-semibold text-[#24292e]">All Issues</h4>
            <div class="flex items-center gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />

                <button class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            </div>
        </div>
<!-- issue buttons -->
 <div class=" shadow-sm p-5 bg-white">
    <button class="btn btn-primary">All</button>
    <button class="btn btn-soft">Open</button>
    <button class="btn btn-soft">Closed</button>
 </div>


    </section>


    <script src="func/home.js"></script>
</body>

</html>
