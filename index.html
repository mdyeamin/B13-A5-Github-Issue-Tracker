<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyui CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontAwesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font geist-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- link with css  -->
    <link rel="stylesheet" href="style.css">
    <!-- fabicon  -->
    <link rel="icon" href="assets/Aperture.png" type="image/x-icon">
    <title>GitHub Issue Tracker</title>
</head>

<body>

    <section class="login form">
        <!-- Login Card -->
        <div
            class="bg-white w-full max-w-[440px] mx-auto rounded-2xl shadow-sm border border-gray-100 p-4 md:p-8 my-10 flex flex-col items-center">

            <!-- Logo & Header -->
            <div class="text-center mb-2">
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-4 object-contain">
                <h1 class="text-2xl font-semibold text-[#24292e] tracking-tight">GitHub Issues Tracker</h1>
                <p class="text-slate-400 text-base font-medium">Sign in to manage your issues</p>
            </div>

            <!-- Form Section -->
            <form class="w-full space-y-5">
                <!-- Username -->
                <div class="form-control w-full">
                    <label class="label px-0 pt-0 pb-2">
                        <span class="label-text text-[14px] font-semibold text-slate-700">Username</span>
                    </label>
                    <input id="user-filed" type="text" placeholder="Enter Username"
                        class="input input-bordered w-full bg-white border-slate-200 focus:outline-none focus:border-[#6610f2] rounded-md placeholder:text-slate-400  shadow-sm" />
                    <label class="label px-0 pt-1 pb-0">
                        <span class="text-sm font-semibold text-[#6610f2]">Default: admin</span>
                    </label>
                </div>

                <!-- Password -->
                <div class="form-control w-full">
                    <label class="label px-0 pt-0 pb-2">
                        <span class="label-text text-[14px] font-semibold text-slate-700">Password</span>
                    </label>
                    <input id="password-filed" type="password" placeholder="Enter Password"
                        class="input input-bordered w-full bg-white border-slate-200 focus:outline-none focus:border-[#6610f2] rounded-md placeholder:text-slate-400  shadow-sm" />
                    <label class="label px-0 pt-1 pb-0">
                        <span class="text-sm font-semibold text-[#6610f2]">Default: admin123</span>
                    </label>
                </div>

                <!-- Sign In Button -->
                <button id="login" type="button"
                    class="btn w-full h-10 bg-[#6610f2] hover:bg-[#520dc2] text-white border-none normal-case text-base font-medium rounded-md shadow-md transition-all">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="divider my-5 text-slate-400 font-bold text-sm before:bg-slate-100 after:bg-slate-100">OR</div>

            <!-- Demo Credentials Footer -->
            <div class="w-full text-center">
                <p class="text-slate-400 text-base mb-4 font-medium">Demo Credentials:</p>
                <div class="bg-[#f8f9fb] rounded-xl p-8 border border-slate-50 flex flex-col gap-1">
                    <p class="text-slate-700 text-lg">
                        <span class="font-semibold">Username:</span> admin
                    </p>
                    <p class="text-slate-700 text-lg">
                        <span class="font-semibold">Password:</span> admin123
                    </p>
                </div>
            </div>

        </div>
    </section>



    <script src="func/login.js"></script>
</body>

</html>
